<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lamego's — AI Voice Ordering</title>
  <style>
    :root {
      --bg-0: #0d0e12;
      --bg-1: #15171d;
      --bg-2: #1c1f27;
      --line: #2a2e3a;
      --text: #e9ecf1;
      --muted: #8b909c;
      --accent: #e63946;
      --accent-2: #f4a261;
      --gold: #d4a259;
      --green: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at top, #1a1d26 0%, var(--bg-0) 60%);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── LEFT PANEL: CALL ─────────────────────────────── */
    .call {
      display: flex;
      flex-direction: column;
      background: var(--bg-1);
      border-right: 1px solid var(--line);
      min-height: 0;
      overflow: hidden;
    }

    .call-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-2);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .brand-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .brand-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .call-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    .status-sep { color: var(--line); margin: 0 2px; }
    .call-timer {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── CHAT ─────────────────────────────────────────── */
    .chat {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble.ai {
      align-self: flex-start;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent) 0%, #c2303d 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bubble-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.6;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .typing {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── CONTROLS ─────────────────────────────────────── */
    .controls {
      flex-shrink: 0;
      height: 200px;
      padding: 14px 24px;
      border-top: 1px solid var(--line);
      background: var(--bg-2);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .mic-wrap {
      position: relative;
      display: grid;
      place-items: center;
    }

    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
      position: relative;
      z-index: 2;
    }

    .mic-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: scale(1.02);
    }
    .mic-btn:active { transform: scale(0.96); }

    .mic-btn.listening {
      background: rgba(74, 158, 120, 0.14);
      border-color: rgba(74, 158, 120, 0.35);
      box-shadow: 0 0 28px rgba(74, 158, 120, 0.18);
    }

    .mic-btn.listening::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(74, 158, 120, 0.3);
      animation: ring 1.8s ease-out infinite;
      pointer-events: none;
    }

    @keyframes ring {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    .mic-btn.processing {
      background: rgba(212, 160, 80, 0.14);
      border-color: rgba(212, 160, 80, 0.4);
    }

    .mic-btn.processing::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(212, 160, 80, 0.5);
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .mic-icon { display: grid; place-items: center; }
    .mic-icon-active { display: none; }
    .mic-btn.listening .mic-icon-idle { display: none; }
    .mic-btn.listening .mic-icon-active { display: grid; }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 22px;
    }

    .waveform span {
      width: 3px;
      background: #b6e3c8;
      border-radius: 2px;
      display: inline-block;
      transform-origin: center;
    }

    .waveform span:nth-child(1) { height: 10px; animation: wave 0.9s ease-in-out infinite; animation-delay: 0s; }
    .waveform span:nth-child(2) { height: 18px; animation: wave 0.9s ease-in-out infinite; animation-delay: 0.12s; }
    .waveform span:nth-child(3) { height: 13px; animation: wave 0.9s ease-in-out infinite; animation-delay: 0.24s; }
    .waveform span:nth-child(4) { height: 20px; animation: wave 0.9s ease-in-out infinite; animation-delay: 0.36s; }
    .waveform span:nth-child(5) { height: 9px; animation: wave 0.9s ease-in-out infinite; animation-delay: 0.48s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.55); }
      50% { transform: scaleY(1.15); }
    }

    .mic-hint {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-row {
      width: 100%;
      display: flex;
      gap: 10px;
    }

    .text-input {
      flex: 1;
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .text-input:focus { border-color: var(--accent); }

    .send-btn, .reset-btn {
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .send-btn { background: var(--accent); border-color: var(--accent); }
    .send-btn:hover { background: #c2303d; }

    .reset-btn {
      width: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .reset-btn:hover {
      background: var(--line);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text);
    }

    .reset-btn:active { transform: scale(0.95); }

    /* ── RIGHT PANEL: ORDER ───────────────────────────── */
    .order {
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .order-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
    }

    .order-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .order-body {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }

    .order-empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 40px;
      font-style: italic;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
      gap: 12px;
      animation: fadeIn 0.3s ease-out;
    }

    .order-item-name {
      font-size: 13px;
      flex: 1;
      line-height: 1.4;
    }

    .order-item-price {
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
      white-space: nowrap;
    }

    .order-total {
      margin-top: 16px;
      padding: 14px 0;
      border-top: 2px solid var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 700;
    }

    .order-total .label { color: var(--text); letter-spacing: 1px; }
    .order-total .value { color: var(--gold); font-size: 22px; }

    .order-footer {
      flex-shrink: 0;
      height: 200px;
      padding: 14px 24px;
      border-top: 1px solid var(--line);
      background: var(--bg-1);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0;
    }

    .footer-row .v { color: var(--text); }

    /* small screens */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .order { border-top: 1px solid var(--line); }
      body { overflow: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- LEFT: CALL -->
    <section class="call">
      <header class="call-header">
        <div class="brand">
          <div class="brand-logo">🍔</div>
          <div class="brand-text">
            <h1>Lamego's Takeaway</h1>
            <p>Wishaw · Blantyre</p>
          </div>
        </div>
        <div class="call-status">
          <span class="live-dot"></span>
          <span id="status-text">Connected</span>
          <span class="status-sep">·</span>
          <span class="call-timer" id="call-timer">00:00</span>
        </div>
      </header>

      <div class="chat" id="chat"></div>

      <div class="controls">
        <div class="mic-wrap">
          <button class="mic-btn" id="mic-btn" title="Tap to record">
            <span class="mic-icon mic-icon-idle">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
              </svg>
            </span>
            <span class="mic-icon mic-icon-active">
              <span class="waveform">
                <span></span><span></span><span></span><span></span><span></span>
              </span>
            </span>
          </button>
        </div>
        <div class="mic-hint" id="mic-hint">Tap to record</div>

        <div class="input-row">
          <input type="text" class="text-input" id="text-input" placeholder="Or type your message..." />
          <button class="send-btn" id="send-btn">Send</button>
          <button class="reset-btn" id="reset-btn" title="Reset call" aria-label="Reset call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <path d="M3 4v5h5"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- RIGHT: ORDER -->
    <aside class="order">
      <div class="order-header">
        <h2>Your Order</h2>
      </div>
      <div class="order-body" id="order-body">
        <div class="order-empty" id="order-empty">No items yet — start ordering!</div>
      </div>
      <div class="order-footer">
        <div class="footer-row"><span>Branch</span><span class="v" id="info-branch">—</span></div>
        <div class="footer-row"><span>Type</span><span class="v" id="info-type">—</span></div>
        <div class="footer-row"><span>Address</span><span class="v" id="info-address">—</span></div>
        <div class="footer-row"><span>ETA</span><span class="v" id="info-eta">—</span></div>
        <div class="footer-row"><span>Name</span><span class="v" id="info-name">—</span></div>
      </div>
    </aside>
  </div>

  <script>
    // ── STATE ────────────────────────────────────────────
    let messages = [];
    let sessionId = null;
    let isListening = false;
    let recognition = null;
    let orderItems = []; // { name, price }
    let currentAudio = null; // active TTS Audio instance currently playing
    let audioQueue = [];     // all queued chunks for the current speak() call

    const chatEl = document.getElementById('chat');
    const micBtn = document.getElementById('mic-btn');
    const micHint = document.getElementById('mic-hint');
    const textInput = document.getElementById('text-input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const statusText = document.getElementById('status-text');
    const orderBody = document.getElementById('order-body');
    const orderEmpty = document.getElementById('order-empty');

    // ── SPEECH RECOGNITION ───────────────────────────────
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      recognition = new SR();
      recognition.lang = 'en-GB';
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        sendMessage(transcript);
      };
      recognition.onend = () => stopListening();
      recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        stopListening();
      };
    } else {
      micBtn.disabled = true;
      micBtn.title = 'Speech recognition not supported — use Chrome';
      micHint.textContent = 'Speech not supported — type instead';
    }

    function startListening() {
      if (!recognition || isListening) return;
      window.speechSynthesis.cancel();
      stopCurrentAudio();
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        micHint.textContent = 'Listening';
      } catch (e) { /* already started */ }
    }

    function stopListening() {
      isListening = false;
      micBtn.classList.remove('listening');
      micHint.textContent = 'Tap to record';
    }

    // ── SERVER-SIDE STT (OpenAI gpt-4o-transcribe) ───────
    // Preferred path: record the mic and transcribe on the server for far
    // better accuracy than the browser. Falls back to browser recognition
    // (above) if recording isn't available or the /stt call fails.
    const canRecord = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
    let mediaRecorder = null;
    let mediaStream = null;
    let recordedChunks = [];
    let recordingCanceled = false;
    let isTranscribing = false;

    // Voice-activity detection: auto-stop after the caller pauses, like a real call.
    const SILENCE_MS = 1000;        // stop this long after speech ends
    const MAX_RECORD_MS = 20000;    // hard safety cap on a single utterance
    const SPEECH_THRESHOLD = 0.012; // RMS above this counts as speech
    let audioCtx = null;
    let analyser = null;
    let vadRAF = null;
    let silenceTimer = null;
    let maxTimer = null;
    let hasSpoken = false;

    // If the browser can record, the mic works even without SpeechRecognition.
    if (canRecord) {
      micBtn.disabled = false;
      micBtn.title = '';
      micHint.textContent = 'Tap to speak';
    }

    function releaseMic() {
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    }

    function setupVAD(stream) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.resume) audioCtx.resume();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        hasSpoken = false;
        const data = new Uint8Array(analyser.fftSize);
        const tick = () => {
          if (!analyser) return;
          analyser.getByteTimeDomainData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
          const rms = Math.sqrt(sum / data.length);
          if (rms > SPEECH_THRESHOLD) {
            hasSpoken = true;
            if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
          } else if (hasSpoken && !silenceTimer) {
            silenceTimer = setTimeout(stopRecording, SILENCE_MS);
          }
          vadRAF = requestAnimationFrame(tick);
        };
        vadRAF = requestAnimationFrame(tick);
      } catch (e) {
        console.warn('VAD unavailable — tap the mic again to stop:', e);
      }
    }

    function teardownVAD() {
      if (vadRAF) { cancelAnimationFrame(vadRAF); vadRAF = null; }
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
      if (maxTimer) { clearTimeout(maxTimer); maxTimer = null; }
      analyser = null;
      if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
      hasSpoken = false;
    }

    async function startRecording() {
      if (isListening) return;
      window.speechSynthesis.cancel();
      stopCurrentAudio();
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        console.error('Mic access failed:', e);
        if (recognition) startListening();          // fall back to browser STT
        else micHint.textContent = 'Mic blocked — type instead';
        return;
      }
      recordedChunks = [];
      recordingCanceled = false;
      let opts;
      if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
        if (MediaRecorder.isTypeSupported('audio/webm')) opts = { mimeType: 'audio/webm' };
        else if (MediaRecorder.isTypeSupported('audio/mp4')) opts = { mimeType: 'audio/mp4' };
      }
      mediaRecorder = opts ? new MediaRecorder(mediaStream, opts) : new MediaRecorder(mediaStream);
      mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = handleRecordingStop;
      mediaRecorder.start();
      isListening = true;
      micBtn.classList.add('listening');
      micHint.textContent = 'Listening — just pause when done';
      setupVAD(mediaStream);
      maxTimer = setTimeout(stopRecording, MAX_RECORD_MS);
    }

    function stopRecording() {
      teardownVAD();
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }

    function cancelRecording() {
      recordingCanceled = true;
      teardownVAD();
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      else releaseMic();
      isListening = false;
      micBtn.classList.remove('listening');
    }

    async function handleRecordingStop() {
      teardownVAD();
      releaseMic();
      isListening = false;
      micBtn.classList.remove('listening');
      const chunks = recordedChunks;
      recordedChunks = [];
      if (recordingCanceled) { recordingCanceled = false; micHint.textContent = 'Tap to speak'; return; }
      const type = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
      const blob = new Blob(chunks, { type });
      if (!blob.size) { micHint.textContent = 'Tap to speak'; return; }
      isTranscribing = true;
      micBtn.classList.add('processing');
      micHint.textContent = '';
      try {
        const res = await fetch('/stt', { method: 'POST', headers: { 'Content-Type': blob.type }, body: blob });
        if (!res.ok) throw new Error('stt ' + res.status);
        const data = await res.json();
        const transcript = (data.text || '').trim();
        if (transcript) sendMessage(transcript);
      } catch (e) {
        console.error('Server STT failed:', e);
      } finally {
        isTranscribing = false;
        micBtn.classList.remove('processing');
        micHint.textContent = 'Tap to speak';
      }
    }

    // ── SPEECH SYNTHESIS ─────────────────────────────────
    let voicesReady = false;
    function loadVoices() {
      voicesReady = window.speechSynthesis.getVoices().length > 0;
    }
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;

    function stopCurrentAudio() {
      audioQueue.forEach(a => {
        try { a.pause(); a.src = ''; } catch (e) {}
      });
      audioQueue = [];
      currentAudio = null;
    }

    // Split text into chunks of ~maxLen chars on sentence boundaries
    // so the first chunk plays fast while later chunks are still loading.
    function splitIntoChunks(text, maxLen = 180) {
      const sentences = text.match(/[^.!?]+[.!?]+|\S[^.!?]*$/g);
      if (!sentences || sentences.length <= 1) return [text];
      const chunks = [];
      let current = '';
      for (const s of sentences) {
        const sentence = s.trim();
        if (!sentence) continue;
        if (!current) current = sentence;
        else if ((current + ' ' + sentence).length <= maxLen) current += ' ' + sentence;
        else { chunks.push(current); current = sentence; }
      }
      if (current) chunks.push(current);
      return chunks.length ? chunks : [text];
    }

    function fallbackBrowserTTS(text) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-GB';
      utt.rate = 1.05;
      utt.pitch = 1.05;
      const voices = window.speechSynthesis.getVoices();
      const gb = voices.find(v => v.lang === 'en-GB');
      if (gb) utt.voice = gb;
      window.speechSynthesis.speak(utt);
    }

    // speak(text, onReady) — splits long text into chunks, fetches them in parallel,
    // plays them sequentially. onReady fires when the first chunk is ready to play.
    function speak(text, onReady) {
      stopCurrentAudio();
      window.speechSynthesis.cancel();
      if (!text || !text.trim()) {
        if (onReady) onReady();
        return;
      }

      let readyFired = false;
      const fireReady = () => {
        if (readyFired) return;
        readyFired = true;
        if (onReady) onReady();
      };

      const chunks = splitIntoChunks(text);

      // Create audio elements for every chunk — browser starts fetching them in parallel
      const audios = chunks.map(chunk => {
        const audio = new Audio();
        audio.preload = 'auto';
        audio.src = '/tts?text=' + encodeURIComponent(chunk);
        return audio;
      });

      audioQueue = audios.slice();
      currentAudio = audios[0];

      // First chunk: fire onReady when it's buffered or starts playing
      audios[0].addEventListener('loadeddata', fireReady, { once: true });
      audios[0].addEventListener('playing', fireReady, { once: true });

      // Chain playback: when chunk N ends, play chunk N+1
      audios.forEach((audio, i) => {
        const next = audios[i + 1] || null;
        audio.addEventListener('ended', () => {
          audioQueue = audioQueue.filter(a => a !== audio);
          if (next) {
            currentAudio = next;
            next.play().catch(err => console.warn('Next chunk play failed:', err));
          } else if (currentAudio === audio) {
            currentAudio = null;
          }
        }, { once: true });

        audio.addEventListener('error', () => {
          console.warn('TTS audio error on chunk', i);
          if (i === 0 && !readyFired) {
            stopCurrentAudio();
            fireReady();
            fallbackBrowserTTS(text);
          }
        });
      });

      // Start playing first chunk
      audios[0].play().catch((err) => {
        stopCurrentAudio();
        fireReady();
        console.warn('First chunk play failed, falling back to browser TTS:', err.message);
        fallbackBrowserTTS(text);
      });

      // Safety: if first chunk takes too long, fire onReady anyway
      setTimeout(fireReady, 1500);
    }

    // ── CHAT RENDERING ───────────────────────────────────
    function renderBubble(role, text) {
      const div = document.createElement('div');
      div.className = `bubble ${role === 'assistant' ? 'ai' : 'user'}`;
      const label = document.createElement('div');
      label.className = 'bubble-label';
      label.textContent = role === 'assistant' ? "Lamego's" : 'You';
      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(label);
      div.appendChild(body);
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    // ── ORDER + CALL INFO (from structured server response) ──
    function applyServerData(data) {
      if (Array.isArray(data.order)) {
        orderItems = data.order
          .filter(it => it && typeof it.name === 'string' && typeof it.price === 'number')
          .map(it => ({ name: it.name, price: it.price }));
        renderOrder();
      }

      const branchEl = document.getElementById('info-branch');
      const typeEl = document.getElementById('info-type');
      const etaEl = document.getElementById('info-eta');

      if (data.branch === 'Wishaw' || data.branch === 'Blantyre') {
        branchEl.textContent = data.branch;
      }
      if (data.orderType === 'delivery') {
        typeEl.textContent = 'Delivery';
        etaEl.textContent = '35-45 min';
      } else if (data.orderType === 'collection') {
        typeEl.textContent = 'Collection';
        etaEl.textContent = '15-20 min';
      }

      const addressEl = document.getElementById('info-address');
      const nameEl = document.getElementById('info-name');
      if (data.address) addressEl.textContent = data.address;
      if (data.customerName) nameEl.textContent = data.customerName;
    }

    function renderOrder() {
      if (orderItems.length === 0) {
        orderBody.innerHTML = '<div class="order-empty">No items yet — start ordering!</div>';
        return;
      }
      const total = orderItems.reduce((s, it) => s + it.price, 0);
      orderBody.innerHTML = '';
      for (const it of orderItems) {
        const row = document.createElement('div');
        row.className = 'order-item';
        row.innerHTML = `<span class="order-item-name">${it.name}</span><span class="order-item-price">£${it.price.toFixed(2)}</span>`;
        orderBody.appendChild(row);
      }
      const totalEl = document.createElement('div');
      totalEl.className = 'order-total';
      totalEl.innerHTML = `<span class="label">TOTAL</span><span class="value">£${total.toFixed(2)}</span>`;
      orderBody.appendChild(totalEl);
    }

    // ── API CALLS ────────────────────────────────────────
    async function newSession() {
      try {
        const res = await fetch('/session/new', { method: 'POST' });
        const data = await res.json();
        sessionId = data.sessionId;
      } catch (e) { console.error('session/new failed', e); }
    }

    async function sendMessage(text) {
      if (!text || !text.trim()) return;
      text = text.trim();

      messages.push({ role: 'user', content: text });
      renderBubble('user', text);
      textInput.value = '';
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, sessionId })
        });
        const data = await res.json();

        if (data.error) {
          hideTyping();
          renderBubble('assistant', `[error] ${data.error}`);
          return;
        }

        const reply = data.text || '';
        // Send raw assistant turn back into history so the AI can see its own JSON state
        messages.push({ role: 'assistant', content: JSON.stringify({
          reply,
          order: data.order || [],
          branch: data.branch || null,
          orderType: data.orderType || null
        })});
        applyServerData(data);
        // Keep the typing dots visible while TTS loads, then reveal bubble + voice together.
        speak(reply, () => {
          hideTyping();
          renderBubble('assistant', reply);
        });
      } catch (e) {
        hideTyping();
        renderBubble('assistant', `[network error] ${e.message}`);
      }
    }

    // ── CALL TIMER ───────────────────────────────────────
    let callStartTime = 0;
    let timerInterval = null;
    function startCallTimer() {
      callStartTime = Date.now();
      if (timerInterval) clearInterval(timerInterval);
      const tick = () => {
        const sec = Math.floor((Date.now() - callStartTime) / 1000);
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        document.getElementById('call-timer').textContent = `${m}:${s}`;
      };
      tick();
      timerInterval = setInterval(tick, 1000);
    }

    // ── INIT GREETING ────────────────────────────────────
    async function initCall() {
      messages = [];
      orderItems = [];
      renderOrder();
      chatEl.innerHTML = '';
      document.getElementById('info-branch').textContent = '—';
      document.getElementById('info-type').textContent = '—';
      document.getElementById('info-eta').textContent = '—';
      document.getElementById('info-address').textContent = '—';
      document.getElementById('info-name').textContent = '—';
      startCallTimer();

      await newSession();
      // Send a hidden "Hello" to trigger the AI greeting
      messages.push({ role: 'user', content: 'Hello' });
      showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, sessionId })
        });
        const data = await res.json();
        if (data.text) {
          const reply = data.text;
          messages.push({ role: 'assistant', content: JSON.stringify({
            reply,
            order: data.order || [],
            branch: data.branch || null,
            orderType: data.orderType || null
          })});
          applyServerData(data);
          speak(reply, () => {
            hideTyping();
            renderBubble('assistant', reply);
          });
        } else {
          hideTyping();
        }
      } catch (e) {
        hideTyping();
        renderBubble('assistant', '[connection error] Is the server running?');
      }
    }

    // ── EVENT BINDINGS ───────────────────────────────────
    micBtn.addEventListener('click', () => {
      if (isTranscribing) return;          // ignore taps while a clip is being transcribed
      if (canRecord) {
        if (isListening) stopRecording();
        else startRecording();
      } else if (recognition) {
        if (isListening) recognition.stop();
        else startListening();
      }
    });

    sendBtn.addEventListener('click', () => sendMessage(textInput.value));

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage(textInput.value);
    });

    resetBtn.addEventListener('click', () => {
      if (confirm('End this call and start a new one?')) {
        window.speechSynthesis.cancel();
        stopCurrentAudio();
        if (canRecord && isListening) cancelRecording();
        else if (recognition && isListening) recognition.stop();
        initCall();
      }
    });

    // Boot
    initCall();
  </script>
</body>
</html>
